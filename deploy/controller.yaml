# CSI controller Deployment: creates/deletes volume directories on the NFS server.
# Requires the NFS server export to be mounted at /nfs-root (see volume below).
# This NFS mount is performed by KUBELET when the pod starts (not by our CSI code).
# If you see "rpc.statd is not running", either start rpc.statd on the node or use
# a PV+PVC with mountOptions: [nolock] and use that PVC as the nfs-root volume.
# Update the NFS volume 'server' and 'path' to match your NFS server.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-csi-controller
  namespace: nfs-csi
  labels:
    app: nfs-csi-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-csi-controller
  template:
    metadata:
      labels:
        app: nfs-csi-controller
    spec:
      serviceAccountName: nfs-csi-controller-sa
      containers:
        # Our CSI driver (controller + identity only; node runs in DaemonSet)
        - name: csi-driver
          image: nfs-csi-driver:latest   # Replace with your built image
          imagePullPolicy: IfNotPresent
          args:
            - "--endpoint=unix:///csi/csi.sock"
            - "--driver-name=nfs.csi.nootnoot.co.uk"
            - "--nfs-server=$(NFS_SERVER)"
            - "--nfs-root-path=$(NFS_ROOT_PATH)"
            - "--nfs-root-mount=/nfs-root" # Local path for controller to mount nfs share
          env:
            - name: NFS_SERVER
              valueFrom:
                configMapKeyRef:
                  name: nfs-csi-config
                  key: NFS_SERVER
            - name: NFS_ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: nfs-csi-config
                  key: NFS_ROOT_PATH
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: nfs-root
              mountPath: /nfs-root
        # Sidecar: watches PVCs and calls CreateVolume/DeleteVolume
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v4.0.0
          args:
            - "-csi-address=unix:///csi/csi.sock"
            - "-driver-name=nfs.csi.nootnoot.co.uk"
            - "-leader-election"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: socket-dir
          emptyDir: {}
        # Mount your NFS server export here so the controller can create dirs.
        # Kubelet mounts this; for "rpc.statd" errors use a PV with mountOptions: [nolock].
        - name: nfs-root
          nfs:
            server: "192.168.1.2"
            path: "/srv/nfs/k8s/volumes"