# CSI controller Deployment: creates/deletes volume directories on the NFS server.
# The nfs-root volume is provided by the nfs-root PVC (see controller-nfs-pv-pvc.yaml),
# which uses a PV with mountOptions: [nolock] so kubelet does not require rpc.statd.
# Apply controller-nfs-pv-pvc.yaml before this Deployment; keep PV server/path in
# sync with deploy/config.yaml and your NFS server.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-csi-controller
  namespace: nfs-csi
  labels:
    app: nfs-csi-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-csi-controller
  template:
    metadata:
      labels:
        app: nfs-csi-controller
    spec:
      serviceAccountName: nfs-csi-controller-sa
      containers:
        # Our CSI driver (controller + identity only; node runs in DaemonSet)
        - name: csi-driver
          image: nfs-csi-driver:latest   # Replace with your built image
          imagePullPolicy: IfNotPresent
          args:
            - "--endpoint=unix:///csi/csi.sock"
            - "--driver-name=nfs.csi.nootnoot.co.uk"
            - "--nfs-server=$(NFS_SERVER)"
            - "--nfs-root-path=$(NFS_ROOT_PATH)"
            - "--nfs-root-mount=/nfs-root" # Local path for controller to mount nfs share
          env:
            - name: NFS_SERVER
              valueFrom:
                configMapKeyRef:
                  name: nfs-csi-config
                  key: NFS_SERVER
            - name: NFS_ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: nfs-csi-config
                  key: NFS_ROOT_PATH
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: nfs-root
              mountPath: /nfs-root
        # Sidecar: watches PVCs and calls CreateVolume/DeleteVolume
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v4.0.0
          args:
            - "-csi-address=unix:///csi/csi.sock"
            - "-driver-name=nfs.csi.nootnoot.co.uk"
            - "-leader-election"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
      volumes:
        - name: socket-dir
          emptyDir: {}
        # NFS root via PVC so kubelet uses the PV's mountOptions (e.g. nolock).
        - name: nfs-root
          persistentVolumeClaim:
            claimName: nfs-root-pvc